<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>testkey-signer</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>testkey-signer</h1>
        <div class="button-grid">
            <button id="verify-current-slot">Verify Current Slot</button>
            <button id="verify-inactive-slot">Verify Inactive Slot</button>
            <button id="patch-current-slot">Patch Current Slot</button>
            <button id="patch-inactive-slot">Patch Inactive Slot</button>
        </div>
        <div id="signing-status">Checking signing status...</div>
        <div id="result"></div>
        <div id="log"></div>
    </div>
    <div id="custom-dialog-overlay" class="dialog-overlay hidden">
        <div class="dialog-box">
            <p id="custom-dialog-message"></p>
            <div class="dialog-buttons">
                <button id="custom-dialog-ok">OK</button>
                <button id="custom-dialog-cancel" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>
    <script src="index.js" type="module"></script>
</body>
</html>
